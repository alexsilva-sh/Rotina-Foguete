<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.5, maximum-scale=5.0"/>
  <title>🚀 Rotina Foguete</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #07071a;
      --surface: rgba(255,255,255,0.04);
      --surface2: rgba(255,255,255,0.08);
      --border: rgba(255,255,255,0.1);
      --alex: #4fc3f7;
      --ket: #f48fb1;
      --gold: #ffd700;
      --green: #69f0ae;
      --red: #ef5350;
      --text: #e8e8f0;
      --text-dim: #8888aa;
      --r: 16px;
      --r-sm: 10px;
    }
    html { font-size: 18px; }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Nunito', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(1px 1px at 8% 12%, rgba(255,255,255,.9) 0%, transparent 1px),
        radial-gradient(1px 1px at 22% 38%, rgba(255,255,255,.7) 0%, transparent 1px),
        radial-gradient(1px 1px at 38% 18%, rgba(255,255,255,.8) 0%, transparent 1px),
        radial-gradient(1px 1px at 52% 62%, rgba(255,255,255,.6) 0%, transparent 1px),
        radial-gradient(1px 1px at 67% 28%, rgba(255,255,255,.9) 0%, transparent 1px),
        radial-gradient(1px 1px at 81% 52%, rgba(255,255,255,.7) 0%, transparent 1px),
        radial-gradient(1px 1px at 14% 72%, rgba(255,255,255,.8) 0%, transparent 1px),
        radial-gradient(1px 1px at 28% 88%, rgba(255,255,255,.6) 0%, transparent 1px),
        radial-gradient(1px 1px at 58% 82%, rgba(255,255,255,.9) 0%, transparent 1px),
        radial-gradient(1px 1px at 92% 8%,  rgba(255,255,255,.7) 0%, transparent 1px),
        radial-gradient(1px 1px at 4% 55%,  rgba(255,255,255,.5) 0%, transparent 1px),
        radial-gradient(1px 1px at 73% 68%, rgba(255,255,255,.8) 0%, transparent 1px),
        radial-gradient(1px 1px at 44% 44%, rgba(255,255,255,.6) 0%, transparent 1px),
        radial-gradient(1px 1px at 18% 5%,  rgba(255,255,255,.9) 0%, transparent 1px),
        radial-gradient(1px 1px at 96% 88%, rgba(255,255,255,.7) 0%, transparent 1px),
        radial-gradient(1px 1px at 33% 55%, rgba(255,255,255,.5) 0%, transparent 1px),
        radial-gradient(1px 1px at 76% 40%, rgba(255,255,255,.8) 0%, transparent 1px),
        radial-gradient(2px 2px at 33% 65%, rgba(79,195,247,.7) 0%, transparent 1px),
        radial-gradient(2px 2px at 63% 15%, rgba(244,143,177,.7) 0%, transparent 1px),
        radial-gradient(2px 2px at 80% 95%, rgba(255,215,0,.5) 0%, transparent 1px),
        radial-gradient(2px 2px at 5%  90%, rgba(105,240,174,.5) 0%, transparent 1px);
      z-index: 0;
    }
    header, nav, main, .modal-overlay { position: relative; z-index: 1; }

    /* ===== HEADER ===== */
    header { padding: 18px 16px 10px; background: linear-gradient(180deg, rgba(79,195,247,.07) 0%, transparent 100%); }
    .header-top { display: flex; align-items: center; justify-content: space-between; max-width: 900px; margin: 0 auto; }
    header h1 { font-size: 1.75rem; font-weight: 900; background: linear-gradient(135deg, var(--alex) 0%, var(--ket) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .header-date { font-size: .78rem; color: var(--text-dim); margin-top: 2px; }
    .manage-btn { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--r-sm); color: var(--text-dim); font-family: inherit; font-size: .85rem; font-weight: 700; padding: 8px 14px; cursor: pointer; transition: all .2s; }
    .manage-btn:hover { border-color: rgba(255,255,255,.3); color: var(--text); }

    /* ===== TABS ===== */
    nav.tabs { display: flex; justify-content: center; gap: 6px; padding: 10px 12px 8px; position: sticky; top: 0; z-index: 50; background: rgba(7,7,26,.92); backdrop-filter: blur(14px); flex-wrap: wrap; }
    .tab-btn { padding: 10px 16px; border: 1px solid var(--border); border-radius: 50px; background: transparent; color: var(--text-dim); font-family: inherit; font-size: .9rem; font-weight: 800; cursor: pointer; transition: all .25s; white-space: nowrap; }
    .tab-btn:hover { border-color: rgba(255,255,255,.2); color: var(--text); background: var(--surface); }
    .tab-btn.active { background: linear-gradient(135deg, rgba(79,195,247,.2), rgba(244,143,177,.2)); border-color: rgba(255,255,255,.25); color: white; box-shadow: 0 0 20px rgba(79,195,247,.12); }

    /* ===== MAIN ===== */
    main.content { max-width: 900px; margin: 0 auto; padding: 16px 16px 80px; }

    /* ===== DAY VIEW ===== */
    .day-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    @media (max-width: 460px) { .day-grid { grid-template-columns: 1fr; } }
    .person-col { background: var(--surface); border-radius: var(--r); border: 1px solid var(--border); overflow: hidden; display: flex; flex-direction: column; }
    .person-header { padding: 14px 16px; display: flex; align-items: center; gap: 12px; }
    .person-header.alex { background: linear-gradient(135deg, rgba(79,195,247,.22), rgba(79,195,247,.04)); border-bottom: 1px solid rgba(79,195,247,.2); }
    .person-header.ket  { background: linear-gradient(135deg, rgba(244,143,177,.22), rgba(244,143,177,.04)); border-bottom: 1px solid rgba(244,143,177,.2); }
    .person-avatar { width: 42px; height: 42px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.3rem; flex-shrink: 0; }
    .person-col.alex .person-avatar { background: linear-gradient(135deg, var(--alex), #0288d1); }
    .person-col.ket  .person-avatar { background: linear-gradient(135deg, var(--ket),  #c2185b); }
    .person-name { font-size: 1.05rem; font-weight: 900; }
    .person-col.alex .person-name { color: var(--alex); }
    .person-col.ket  .person-name { color: var(--ket); }
    .person-sub { font-size: .7rem; color: var(--text-dim); font-weight: 600; }
    .task-list { flex: 1; padding: 6px 0; }
    .task-item { display: flex; align-items: center; gap: 12px; padding: 14px 16px; cursor: pointer; transition: background .15s; border-bottom: 1px solid rgba(255,255,255,.04); user-select: none; }
    .task-item:last-child { border-bottom: none; }
    .task-item:hover { background: var(--surface2); }
    .task-item.completed { opacity: .42; }
    .task-item.completed .task-title { text-decoration: line-through; }
    .task-check { width: 32px; height: 32px; border-radius: 8px; border: 2px solid; display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: .95rem; transition: all .18s; }
    .person-col.alex .task-check         { border-color: var(--alex); color: white; }
    .person-col.alex .task-check.checked { background: var(--alex); border-color: var(--alex); }
    .person-col.ket  .task-check         { border-color: var(--ket); color: white; }
    .person-col.ket  .task-check.checked { background: var(--ket);  border-color: var(--ket); }
    .task-info { flex: 1; min-width: 0; }
    .task-title { font-size: .95rem; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .task-pts   { font-size: .72rem; color: var(--text-dim); font-weight: 600; }
    .person-footer { padding: 14px 16px; border-top: 1px solid var(--border); text-align: center; }
    .score-display { font-size: 2.1rem; font-weight: 900; line-height: 1; }
    .person-col.alex .score-display { color: var(--alex); }
    .person-col.ket  .score-display { color: var(--ket);  }
    .score-label { font-size: .7rem; color: var(--text-dim); font-weight: 700; text-transform: uppercase; letter-spacing: .05em; margin-top: 2px; }
    .empty-state { padding: 28px 16px; text-align: center; color: var(--text-dim); font-size: .85rem; line-height: 1.6; }

    /* ===== CATEGORY HEADERS ===== */
    .cat-header {
      display: flex; align-items: center; gap: 7px;
      padding: 6px 16px 4px;
      font-size: .68rem; font-weight: 800; text-transform: uppercase; letter-spacing: .06em;
      color: var(--cat-color, var(--text-dim));
      border-left: 3px solid var(--cat-color, var(--border));
      background: rgba(255,255,255,.02);
      margin-top: 4px;
    }
    .cat-header:first-child { margin-top: 0; }
    .cat-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--cat-color, var(--text-dim));
      flex-shrink: 0;
    }
    .cat-toggle-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 7px;
    }
    .cat-toggle-btn {
      padding: 8px 10px; border-radius: var(--r-sm);
      border: 2px solid rgba(255,255,255,.08);
      background: transparent; color: var(--text-dim);
      font-family: inherit; font-size: .78rem; font-weight: 700;
      cursor: pointer; transition: all .18s; text-align: left;
    }
    .cat-toggle-btn.active {
      border-color: var(--cat-color, white);
      background: var(--surface2);
      color: var(--cat-color, white);
    }
    .cat-stat-row { display: flex; flex-direction: column; gap: 2px; }
    .cat-stat-hdr { display: flex; justify-content: space-between; align-items: center; font-size: .82rem; }

    /* ===== WEEK / MONTH ===== */
    .period-summary { background: var(--surface); border-radius: var(--r); border: 1px solid var(--border); overflow: hidden; }
    .period-header { display: grid; grid-template-columns: 1fr 80px 80px 80px; padding: 10px 16px; background: var(--surface2); border-bottom: 1px solid var(--border); font-size: .72rem; font-weight: 800; text-transform: uppercase; letter-spacing: .05em; color: var(--text-dim); }
    .period-header .col-alex { color: var(--alex); text-align: center; }
    .period-header .col-ket  { color: var(--ket);  text-align: center; }
    .period-header .col-win  { text-align: center; }
    .period-row { display: grid; grid-template-columns: 1fr 80px 80px 80px; padding: 11px 16px; border-bottom: 1px solid rgba(255,255,255,.04); align-items: center; transition: background .15s; }
    .period-row:last-child { border-bottom: none; }
    .period-row:hover { background: var(--surface2); }
    .period-row.today { background: rgba(255,215,0,.05); border-left: 2px solid var(--gold); }
    .period-row.future { opacity: .35; }
    .period-row.total-row { background: var(--surface2); font-weight: 900; }
    .day-info .day-name { font-weight: 800; font-size: .88rem; }
    .day-info .day-date { font-size: .72rem; color: var(--text-dim); }
    .period-pts { text-align: center; font-weight: 800; font-size: .92rem; }
    .period-pts.alex { color: var(--alex); }
    .period-pts.ket  { color: var(--ket);  }
    .winner-badge { text-align: center; font-size: .82rem; font-weight: 700; }
    .period-section-title { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
    .period-section-title h2 { font-size: .95rem; font-weight: 900; }
    .period-section-title span { font-size: .78rem; color: var(--text-dim); }
    .month-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
    .month-nav-btn { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-family: inherit; font-weight: 700; padding: 6px 14px; cursor: pointer; transition: all .2s; }
    .month-nav-btn:hover { background: var(--surface2); }
    .month-title { font-size: 1rem; font-weight: 900; }
    .month-mini-cards { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
    .mini-card { border-radius: var(--r-sm); padding: 14px; text-align: center; }
    .mini-card.alex-card { background: rgba(79,195,247,.1); border: 1px solid rgba(79,195,247,.2); }
    .mini-card.ket-card  { background: rgba(244,143,177,.1); border: 1px solid rgba(244,143,177,.2); }
    .mini-card-pts { font-size: 1.55rem; font-weight: 900; }
    .mini-card.alex-card .mini-card-pts { color: var(--alex); }
    .mini-card.ket-card  .mini-card-pts { color: var(--ket); }
    .mini-card-sub { font-size: .7rem; color: var(--text-dim); font-weight: 700; margin-top: 2px; }

    /* ===== WINNER / ROULETTE SECTION ===== */
    .winner-section {
      margin-top: 18px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: 20px;
      text-align: center;
    }
    .winner-section .ws-label {
      font-size: .7rem; color: var(--text-dim); font-weight: 800;
      text-transform: uppercase; letter-spacing: .06em; margin-bottom: 8px;
    }
    .ws-status {
      font-size: .92rem; font-weight: 800; margin-bottom: 14px; min-height: 1.4em;
    }
    .ws-status.neutral { color: var(--text-dim); }
    .ws-status.winner  { color: inherit; }
    .ws-spin-area { margin-bottom: 12px; }
    /* Active spin button */
    .spin-btn {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 13px 28px; border: none; border-radius: 50px;
      background: linear-gradient(135deg, var(--gold), #ff8f00);
      color: #07071a; font-family: inherit; font-size: .95rem; font-weight: 900;
      cursor: pointer; transition: all .2s;
      box-shadow: 0 4px 20px rgba(255,215,0,.3);
    }
    .spin-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 28px rgba(255,215,0,.45); }
    /* Locked state */
    .spin-btn--locked {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 13px 28px; border: 1px solid var(--border); border-radius: 50px;
      background: var(--surface2); color: var(--text-dim);
      font-family: inherit; font-size: .92rem; font-weight: 800;
      cursor: not-allowed; opacity: .7;
    }
    .spin-lock-reason {
      margin-top: 7px; font-size: .75rem; color: var(--text-dim); font-weight: 700;
    }
    /* Already done state */
    .spin-btn--done {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 11px 22px; border: 1px solid rgba(105,240,174,.3); border-radius: 50px;
      background: rgba(105,240,174,.08); color: var(--green);
      font-family: inherit; font-size: .88rem; font-weight: 800;
      cursor: default;
    }
    .spin-already-result {
      display: flex; align-items: center; gap: 10px; justify-content: center;
      margin-top: 10px; padding: 10px 14px;
      background: rgba(255,215,0,.06); border: 1px solid rgba(255,215,0,.15);
      border-radius: var(--r-sm);
    }

    /* ===== RANKING ===== */
    .ranking-cards { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }
    @media (max-width: 480px) { .ranking-cards { grid-template-columns: 1fr; } }
    .rank-card { background: var(--surface); border-radius: var(--r); border: 1px solid var(--border); padding: 20px 16px; text-align: center; position: relative; overflow: hidden; }
    .rank-card.alex::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: linear-gradient(90deg, var(--alex), transparent); }
    .rank-card.ket::before  { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: linear-gradient(90deg, var(--ket),  transparent); }
    .rank-avatar { width: 58px; height: 58px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.55rem; margin: 0 auto 10px; }
    .rank-card.alex .rank-avatar { background: linear-gradient(135deg, var(--alex), #0288d1); }
    .rank-card.ket  .rank-avatar { background: linear-gradient(135deg, var(--ket),  #c2185b); }
    .rank-name { font-size: 1.05rem; font-weight: 900; margin-bottom: 4px; }
    .rank-card.alex .rank-name { color: var(--alex); }
    .rank-card.ket  .rank-name { color: var(--ket);  }
    .rank-level { font-size: .72rem; background: var(--surface2); border-radius: 20px; padding: 3px 10px; display: inline-block; margin-bottom: 4px; font-weight: 700; }
    .rank-total { font-size: 2.4rem; font-weight: 900; line-height: 1.1; }
    .rank-card.alex .rank-total { color: var(--alex); }
    .rank-card.ket  .rank-total { color: var(--ket);  }
    .rank-total-label { font-size: .68rem; color: var(--text-dim); font-weight: 700; text-transform: uppercase; letter-spacing: .05em; margin-bottom: 12px; }
    .level-bar-wrap { background: rgba(255,255,255,.06); border-radius: 20px; height: 6px; margin: 8px 0 14px; overflow: hidden; }
    .level-bar-fill { height: 100%; border-radius: 20px; transition: width .5s ease; }
    .rank-card.alex .level-bar-fill { background: var(--alex); }
    .rank-card.ket  .level-bar-fill { background: var(--ket); }
    .rank-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .rank-stat { background: var(--surface2); border-radius: 8px; padding: 8px 6px; }
    .rank-stat-val   { font-size: 1.2rem; font-weight: 900; }
    .rank-stat-label { font-size: .62rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: .03em; }
    .comparison-block { background: var(--surface); border-radius: var(--r); border: 1px solid var(--border); padding: 18px; margin-bottom: 14px; }
    .comparison-block h3 { font-size: .8rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: .05em; margin-bottom: 12px; }
    .bar-labels { display: flex; justify-content: space-between; font-size: .78rem; font-weight: 700; margin-bottom: 6px; }
    .bar-track { background: var(--surface2); border-radius: 20px; height: 22px; display: flex; overflow: hidden; }
    .bar-alex { height: 100%; background: linear-gradient(90deg, var(--alex), #0288d1); transition: width .6s ease; display: flex; align-items: center; padding-left: 8px; }
    .bar-ket  { height: 100%; background: linear-gradient(90deg, var(--ket), #c2185b);  transition: width .6s ease; display: flex; align-items: center; justify-content: flex-end; padding-right: 8px; }
    .bar-lbl  { font-size: .68rem; font-weight: 900; color: rgba(255,255,255,.9); }
    .leader-banner { background: rgba(255,215,0,.07); border: 1px solid rgba(255,215,0,.22); border-radius: var(--r-sm); padding: 10px 16px; text-align: center; margin-bottom: 14px; }
    .leader-banner .lbl { font-size: .7rem; color: var(--gold); font-weight: 800; text-transform: uppercase; letter-spacing: .05em; }
    .leader-banner .val { font-size: 1rem; font-weight: 900; margin-top: 2px; }

    /* ===== VALES ===== */
    .vales-section { margin-top: 4px; }
    .vales-section h3 { font-size: .8rem; font-weight: 800; color: var(--text-dim); text-transform: uppercase; letter-spacing: .05em; margin-bottom: 10px; }
    .vales-list { display: flex; flex-direction: column; gap: 10px; }
    .vale-card {
      background: var(--surface);
      border-radius: var(--r-sm);
      border: 1px solid var(--border);
      padding: 14px;
      display: flex;
      gap: 12px;
      align-items: flex-start;
      transition: border-color .2s;
    }
    .vale-card.monthly { border-color: rgba(255,215,0,.18); }
    .vale-card.fulfilled { opacity: .5; }
    .vale-card.broken    { opacity: .5; border-color: rgba(239,83,80,.2); }
    .vale-icon { font-size: 2.2rem; flex-shrink: 0; line-height: 1; padding-top: 2px; }
    .vale-info { flex: 1; min-width: 0; }
    .vale-title { font-size: .95rem; font-weight: 900; margin-bottom: 3px; }
    .vale-meta  { font-size: .7rem; color: var(--text-dim); font-weight: 700; margin-bottom: 5px; }
    .vale-desc  { font-size: .78rem; color: var(--text-dim); line-height: 1.45; }
    .vale-penalty { font-size: .72rem; color: var(--red); font-weight: 700; margin-top: 4px; }
    .vale-actions { display: flex; flex-direction: column; gap: 6px; flex-shrink: 0; }
    .btn-fulfill {
      padding: 7px 11px; border: 1px solid rgba(105,240,174,.3); border-radius: 8px;
      background: rgba(105,240,174,.12); color: var(--green);
      font-family: inherit; font-size: .75rem; font-weight: 700; cursor: pointer; white-space: nowrap; transition: all .2s;
    }
    .btn-fulfill:hover { background: rgba(105,240,174,.22); }
    .btn-break {
      padding: 7px 11px; border: 1px solid rgba(239,83,80,.3); border-radius: 8px;
      background: rgba(239,83,80,.1); color: var(--red);
      font-family: inherit; font-size: .75rem; font-weight: 700; cursor: pointer; white-space: nowrap; transition: all .2s;
    }
    .btn-break:hover { background: rgba(239,83,80,.2); }
    .vale-status-badge {
      display: inline-block; font-size: .65rem; font-weight: 800; text-transform: uppercase;
      letter-spacing: .05em; padding: 2px 8px; border-radius: 20px; margin-top: 4px;
    }
    .vale-status-badge.fulfilled { background: rgba(105,240,174,.12); color: var(--green); }
    .vale-status-badge.broken    { background: rgba(239,83,80,.12);   color: var(--red); }

    /* ===== ROULETTE MODAL ===== */
    .wheel-modal-body { padding: 16px 20px 20px; }
    .wheel-winner-banner { text-align: center; margin-bottom: 18px; }
    .wheel-winner-banner .ww-label { font-size: .72rem; color: var(--gold); font-weight: 800; text-transform: uppercase; letter-spacing: .06em; }
    .wheel-winner-banner .ww-name  { font-size: 1.2rem; font-weight: 900; margin-top: 4px; }
    .wheel-wrap {
      position: relative;
      width: 280px;
      height: 280px;
      margin: 0 auto;
    }
    .wheel-pointer {
      position: absolute;
      top: -14px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 1.6rem;
      color: var(--gold);
      text-shadow: 0 0 14px rgba(255,215,0,.8);
      z-index: 2;
      line-height: 1;
      pointer-events: none;
    }
    .wheel-svg-wrap {
      width: 100%;
      height: 100%;
      transform-origin: center center;
      will-change: transform;
    }
    .spin-result-area { min-height: 56px; margin: 16px 0 4px; }
    .spin-result-banner {
      background: rgba(255,215,0,.1);

    /* ===== MODALS ===== */

    @keyframes slideUp { from { transform: translateY(40px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

    .modal-title { font-size: 1.05rem; font-weight: 900; }
    .modal-close { background: var(--surface2); border: none; border-radius: 8px; color: var(--text-dim); font-size: 1rem; width: 30px; height: 30px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all .2s; flex-shrink: 0; }

    .form-group { margin-bottom: 14px; }

    .form-input { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: var(--r-sm); color: var(--text); font-family: inherit; font-size: .92rem; font-weight: 600; padding: 10px 14px; transition: border-color .2s; }
    .form-input:focus { outline: none; border-color: rgba(255,255,255,.35); }

    .toggle-group { display: flex; gap: 6px; flex-wrap: wrap; }
    .toggle-btn { padding: 7px 14px; border: 1px solid var(--border); border-radius: 50px; background: transparent; color: var(--text-dim); font-family: inherit; font-size: .82rem; font-weight: 700; cursor: pointer; transition: all .2s; }
    .toggle-btn:hover { border-color: rgba(255,255,255,.25); color: var(--text); }
    .toggle-btn.active { background: rgba(255,255,255,.1); border-color: rgba(255,255,255,.35); color: white; }
    .toggle-btn.alex-btn.active { background: rgba(79,195,247,.2); border-color: var(--alex); color: var(--alex); }
    .toggle-btn.ket-btn.active  { background: rgba(244,143,177,.2); border-color: var(--ket); color: var(--ket); }
    .day-toggles { display: flex; gap: 5px; flex-wrap: wrap; }
    .day-toggle { width: 38px; height: 38px; border-radius: 50%; border: 1px solid var(--border); background: transparent; color: var(--text-dim); font-family: inherit; font-size: .68rem; font-weight: 800; cursor: pointer; transition: all .2s; }

    .form-actions { display: flex; gap: 10px; margin-top: 18px; }
    .btn-primary { flex: 1; padding: 12px; border: none; border-radius: var(--r-sm); background: linear-gradient(135deg, var(--alex), var(--ket)); color: white; font-family: inherit; font-size: .92rem; font-weight: 800; cursor: pointer; transition: all .2s; }
    .btn-primary:hover { opacity: .88; transform: translateY(-1px); }
    .btn-danger { padding: 12px 16px; border: 1px solid rgba(239,83,80,.4); border-radius: var(--r-sm); background: rgba(239,83,80,.1); color: var(--red); font-family: inherit; font-size: .92rem; font-weight: 800; cursor: pointer; transition: all .2s; }
    .btn-danger:hover { background: rgba(239,83,80,.2); }
    .manage-list { display: flex; flex-direction: column; gap: 8px; }
    .manage-task-item { display: flex; align-items: center; gap: 10px; background: var(--surface2); border-radius: var(--r-sm); border: 1px solid var(--border); padding: 11px 12px; transition: border-color .2s, background .2s; }
    .manage-task-item.dragging { opacity: .45; }
    .drag-handle { color: var(--text-dim); cursor: grab; font-size: 1.1rem; padding: 2px 4px; flex-shrink: 0; line-height: 1; }
    .drag-handle:active { cursor: grabbing; }
    .manage-task-info { flex: 1; min-width: 0; }
    .manage-task-title { font-weight: 700; font-size: .88rem; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .manage-task-meta { display: flex; gap: 5px; flex-wrap: wrap; }
    .badge { font-size: .62rem; font-weight: 800; text-transform: uppercase; letter-spacing: .04em; padding: 2px 8px; border-radius: 20px; }
    .badge-alex   { background: rgba(79,195,247,.18);  color: var(--alex); }
    .badge-ket    { background: rgba(244,143,177,.18); color: var(--ket); }
    .badge-ambos  { background: rgba(255,255,255,.08); color: var(--text-dim); }

    .manage-task-btns { display: flex; gap: 6px; flex-shrink: 0; }
    .icon-btn { background: var(--surface); border: 1px solid var(--border); border-radius: 7px; color: var(--text-dim); font-size: .88rem; width: 30px; height: 30px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all .2s; }

    .add-task-btn { display: flex; align-items: center; justify-content: center; gap: 8px; width: 100%; padding: 11px; border: 1px dashed rgba(255,255,255,.18); border-radius: var(--r-sm); background: transparent; color: var(--text-dim); font-family: inherit; font-size: .88rem; font-weight: 700; cursor: pointer; transition: all .2s; margin-bottom: 12px; }

    .shop-section-hdr {

    }

      font-size: .75rem; font-weight: 700; padding: 5px 12px;

    .shop-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; }

      background: var(--surface); border: 1px solid var(--border); border-radius: var(--r);

    .sic-emoji { font-size: 2rem; line-height: 1; }
    .sic-name  { font-size: .88rem; font-weight: 800; }
    .sic-desc  { font-size: .7rem; color: var(--text-dim); line-height: 1.4; flex: 1; }
    .sic-price { font-size: .92rem; font-weight: 900; color: var(--gold); margin-top: 4px; }
    .sic-special-badge {
      font-size: .6rem; font-weight: 800; text-transform: uppercase; letter-spacing: .04em;
      background: rgba(255,215,0,.12); color: var(--gold); border-radius: 20px; padding: 2px 7px;
      display: inline-block; margin-bottom: 2px;
    }
    .sic-buy-row { display: flex; gap: 6px; margin-top: 6px; }
    .sic-buy-btn {
      flex: 1; padding: 8px 4px; border: none; border-radius: 8px;
      font-family: inherit; font-size: .72rem; font-weight: 800; cursor: pointer; transition: all .2s;
    }
    .sic-buy-btn.alex { background: rgba(79,195,247,.18); color: var(--alex); }
    .sic-buy-btn.alex:hover:not(:disabled) { background: rgba(79,195,247,.3); }
    .sic-buy-btn.ket  { background: rgba(244,143,177,.18); color: var(--ket); }
    .sic-buy-btn.ket:hover:not(:disabled)  { background: rgba(244,143,177,.3); }
    .sic-buy-btn:disabled { opacity: .35; cursor: not-allowed; }

    .shop-history { margin-top: 24px; }
    .shop-history-list { display: flex; flex-direction: column; gap: 6px; margin-top: 8px; }
    .shop-history-item {
      display: flex; align-items: center; gap: 10px;
      background: var(--surface); border: 1px solid var(--border); border-radius: var(--r-sm);
      padding: 9px 12px; font-size: .82rem;
    }
    .shi-emoji { font-size: 1.2rem; flex-shrink: 0; }
    .shi-info  { flex: 1; }
    .shi-name  { font-weight: 700; }
    .shi-meta  { font-size: .68rem; color: var(--text-dim); margin-top: 1px; }
    .shi-price { font-weight: 800; font-size: .82rem; color: var(--red); white-space: nowrap; }

    /* ===== PRIZE CONFIG ===== */
    .prize-config-link {
      background: transparent; border: none; color: var(--text-dim);
      font-family: inherit; font-size: .78rem; font-weight: 700;
      cursor: pointer; text-decoration: underline; text-decoration-color: rgba(255,255,255,.2);
      padding: 4px 0; transition: color .2s;
    }
    .prize-config-link:hover { color: var(--text); }
    .prize-type-tabs { display: flex; gap: 8px; margin-bottom: 16px; }
    .prize-type-tab { flex: 1; padding: 9px; border: 1px solid var(--border); border-radius: var(--r-sm); background: transparent; color: var(--text-dim); font-family: inherit; font-size: .85rem; font-weight: 700; cursor: pointer; transition: all .2s; }
    .prize-type-tab.active { background: var(--surface2); border-color: rgba(255,255,255,.25); color: white; }
    .prize-item { display: flex; align-items: center; gap: 10px; background: var(--surface2); border-radius: var(--r-sm); border: 1px solid var(--border); padding: 10px 12px; margin-bottom: 7px; }
    .prize-item.disabled { opacity: .38; }
    .prize-onoff { width: 28px; height: 28px; border-radius: 50%; border: 2px solid; font-size: .75rem; font-weight: 900; cursor: pointer; flex-shrink: 0; display: flex; align-items: center; justify-content: center; transition: all .2s; }
    .prize-onoff.on  { background: rgba(105,240,174,.15); border-color: var(--green); color: var(--green); }
    .prize-onoff.off { background: transparent; border-color: var(--border); color: var(--text-dim); }
    .prize-info { flex: 1; min-width: 0; }
    .prize-emoji-name { font-size: .88rem; font-weight: 700; }
    .prize-desc-small { font-size: .68rem; color: var(--text-dim); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 2px; }
    .prize-edit-form { background: rgba(255,255,255,.04); border: 1px solid rgba(255,255,255,.12); border-radius: var(--r-sm); padding: 14px; margin-bottom: 8px; }
    .prize-edit-row { display: grid; grid-template-columns: 70px 1fr; gap: 8px; margin-bottom: 10px; }
    .btn-sm { padding: 8px 16px; border: none; border-radius: var(--r-sm); background: rgba(79,195,247,.2); color: var(--alex); font-family: inherit; font-size: .82rem; font-weight: 800; cursor: pointer; transition: all .2s; }
    .btn-sm:hover { background: rgba(79,195,247,.3); }
    .btn-sm-ghost { padding: 8px 14px; border: 1px solid var(--border); border-radius: var(--r-sm); background: transparent; color: var(--text-dim); font-family: inherit; font-size: .82rem; font-weight: 700; cursor: pointer; transition: all .2s; }
    .btn-sm-ghost:hover { border-color: rgba(255,255,255,.25); color: var(--text); }
    .prizes-footer { display: flex; gap: 8px; margin-top: 14px; }
    .prizes-footer .add-task-btn { margin: 0; flex: 1; }

    /* ===== MISC ===== */
    .point-popup { position: fixed; pointer-events: none; z-index: 999; font-family: 'Nunito', sans-serif; font-weight: 900; font-size: 1.05rem; animation: ptFloat .85s ease forwards; }
    @keyframes ptFloat { 0% { transform: translateY(0) scale(1); opacity: 1; } 60% { transform: translateY(-50px) scale(1.25); opacity: 1; } 100% { transform: translateY(-70px) scale(1.1); opacity: 0; } }
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,.1); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,.2); }
    .section-divider { height: 1px; background: var(--border); margin: 18px 0; }
  </style>
</head>
<body>

<header>
  <div class="header-top">
    <div>
      <h1>🚀 Rotina Foguete</h1>
      <div class="header-date" id="headerDate"></div>
    </div>
    <div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px;">
      <button class="manage-btn" id="btnManage">⚙️ Tarefas</button>
      <span id="syncBadge" style="font-size:.6rem;font-weight:800;padding:3px 9px;border-radius:20px;cursor:default;transition:all .3s;">⏳ Conectando…</span>
    </div>
  </div>
</header>

<nav class="tabs">
  <button class="tab-btn active" data-tab="dia">📅 Dia</button>
  <button class="tab-btn" data-tab="semana">📊 Semana</button>
  <button class="tab-btn" data-tab="mes">📆 Mês</button>
  <button class="tab-btn" data-tab="ranking">🏆 Ranking</button>
  <button class="tab-btn" data-tab="loja">🛒 Loja</button>
</nav>

<main class="content" id="mainContent"></main>

<!-- Manage Tasks Modal -->
<div class="modal-overlay" id="modalManage" hidden>
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">⚙️ Gerenciar Tarefas</span>
      <button class="modal-close" id="btnCloseManage">✕</button>
    </div>
    <div class="modal-body" id="manageBody"></div>
  </div>
</div>

<!-- Task Edit Modal -->
<div class="modal-overlay layer2" id="modalTask" hidden>
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="taskModalTitle">➕ Nova Tarefa</span>
      <button class="modal-close" id="btnCloseTask">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label class="form-label">Título (pode incluir emoji)</label>
        <input class="form-input" id="inputTitle" type="text" maxlength="60" placeholder="Ex: ☕ Fazer café"/>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Pontos</label>
          <input class="form-input" id="inputPoints" type="number" min="1" max="999" value="10"/>
        </div>
        <div class="form-group">
          <label class="form-label">Tipo</label>
          <div class="toggle-group" id="typeGroup">
            <button class="toggle-btn active" data-val="recorrente">🔄 Recorrente</button>
            <button class="toggle-btn" data-val="avulso">📌 Avulso</button>
          </div>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Para quem</label>
        <div class="toggle-group" id="assigneeGroup">
          <button class="toggle-btn alex-btn active" data-val="alex">💙 Alex</button>
          <button class="toggle-btn ket-btn" data-val="ketellyn">💗 Kétellyn</button>
          <button class="toggle-btn" data-val="ambos">🤝 Ambos</button>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Categoria</label>
        <div class="cat-toggle-grid" id="categoryGroup"></div>
      </div>
      <div class="form-group" id="daysGroup">
        <label class="form-label">Dias da semana <span style="font-weight:400;text-transform:none;font-size:.9em;">(nenhum = todos)</span></label>
        <div class="day-toggles" id="dayToggles"></div>
      </div>
      <div class="form-group" id="dateGroup" style="display:none">
        <label class="form-label">Data</label>
        <input class="form-input" id="inputDate" type="date"/>
      </div>
      <div class="form-actions" id="taskFormActions">
        <button class="btn-primary" id="btnSaveTask">Salvar Tarefa</button>
      </div>
    </div>
  </div>
</div>

<!-- Shop Manage Modal -->
<div class="modal-overlay layer2" id="modalShopManage" hidden>
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">🛒 Gerenciar Loja</span>
      <button class="modal-close" id="btnCloseShopManage">✕</button>
    </div>
    <div class="modal-body" id="shopManageBody"></div>
  </div>
</div>

<!-- Shop Item Edit Modal -->
<div class="modal-overlay layer3" id="modalShopItem" hidden>
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="shopItemModalTitle">➕ Novo Item</span>
      <button class="modal-close" id="btnCloseShopItem">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Emoji</label>
          <input class="form-input" id="si_emoji" type="text" maxlength="4" placeholder="🎁" style="text-align:center;font-size:1.3rem;padding:8px;"/>
        </div>
        <div class="form-group">
          <label class="form-label">Preço (⚡ fótons)</label>
          <input class="form-input" id="si_price" type="number" min="1" max="99999" placeholder="100"/>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Nome</label>
        <input class="form-input" id="si_name" type="text" maxlength="40" placeholder="Nome do item"/>
      </div>
      <div class="form-group">
        <label class="form-label">Descrição</label>
        <input class="form-input" id="si_desc" type="text" maxlength="80" placeholder="O que é este item..."/>
      </div>
      <div class="form-group">
        <label class="form-label">Tipo especial</label>
        <div class="toggle-group" id="siSpecialGroup">
          <button class="toggle-btn active" data-val="">Nenhum</button>
          <button class="toggle-btn" data-val="extra_spin_weekly">🎡 +Giro Semanal</button>
          <button class="toggle-btn" data-val="extra_spin_monthly">🎰 +Giro Mensal</button>
        </div>
      </div>
      <div class="form-actions" id="shopItemFormActions">
        <button class="btn-primary" id="btnSaveShopItem">Salvar Item</button>
      </div>
    </div>
  </div>
</div>

<!-- Prizes Config Modal -->
<div class="modal-overlay layer2" id="modalPrizes" hidden>
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">🎡 Configurar Prêmios</span>
      <button class="modal-close" id="btnClosePrizes">✕</button>
    </div>
    <div class="modal-body" id="prizesBody"></div>
  </div>
</div>

<!-- Roulette Modal -->
<div class="modal-overlay layer3" id="modalRoulette" hidden>
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="rouletteTitle">🎡 Roleta</span>
      <button class="modal-close" id="btnCloseRoulette">✕</button>
    </div>
    <div class="wheel-modal-body" id="rouletteBody"></div>
  </div>
</div>

<script>
// ======================== CONSTANTS ========================
const STORAGE_KEY = 'rotina_foguete_v4';
const DAY_SHORT  = ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
const DAY_FULL   = ['Domingo','Segunda-feira','Terça-feira','Quarta-feira','Quinta-feira','Sexta-feira','Sábado'];
const MONTHS     = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
const LEVELS     = [
  { min: 0,    emoji: '🌱', name: 'Calouro',     next: 100  },
  { min: 100,  emoji: '⭐', name: 'Aventureiro', next: 300  },
  { min: 300,  emoji: '⚔️', name: 'Guerreiro',   next: 600  },
  { min: 600,  emoji: '🦸', name: 'Herói',       next: 1000 },
  { min: 1000, emoji: '👑', name: 'Lenda',       next: 2000 },
  { min: 2000, emoji: '🚀', name: 'Foguete',     next: null },
];

let state;

function _migrateState() {
  if (!state.adjustments) state.adjustments = [];
  if (!state.spins)       state.spins = [];
  if (!state.vales)       state.vales = [];
  if (!state.prizes)      state.prizes = {};
  if (!state.prizes.weekly)  state.prizes.weekly  = WEEKLY_PRIZES.map(p=>({...p,enabled:true}));
  if (!state.prizes.monthly) state.prizes.monthly = MONTHLY_PRIZES.map(p=>({...p,enabled:true}));
  if (!state.shopItems)  state.shopItems  = DEFAULT_SHOP_ITEMS.map(i=>({...i}));
  if (!state.purchases)  state.purchases  = [];
  if (!state.extraSpins) state.extraSpins = [];
  // Garante categoria em todas as tarefas existentes
  state.tasks.forEach(t => { if (!t.category) t.category = 'outros'; });
}

// Timeout compatível com Android antigo (sem AbortSignal.timeout)
function _fetchT(url, opts, ms) {
  const ctrl = new AbortController();
  const t = setTimeout(() => ctrl.abort(), ms);
  return fetch(url, { ...opts, signal: ctrl.signal }).finally(() => clearTimeout(t));
}

function _setSyncBadge(status) {
  const el = document.getElementById('syncBadge');
  if (!el) return;
  if (status === 'checking') {
    el.textContent = '⏳ Conectando…';
    el.style.background = 'rgba(255,255,255,.08)';
    el.style.color = 'var(--text-dim)';
  } else if (status === 'ok') {
    el.textContent = '☁️ Sync ativo';
    el.style.background = 'rgba(105,240,174,.15)';
    el.style.color = '#69f0ae';
  } else {
    el.textContent = '⚠️ Sem servidor';
    el.style.background = 'rgba(239,83,80,.15)';
    el.style.color = '#ef5350';
  }
}

async function loadState() {
  _setSyncBadge('checking');
  // 1. Verifica se o servidor Node está rodando (ping específico)
  let nodeRunning = false;
  try {
    const ping = await _fetchT('/api/ping', {}, 3000);
    if (ping.ok) {
      const p = await ping.json();
      nodeRunning = p && p.rotina === true;
    }
  } catch(e) {}

  if (!nodeRunning) {
    _setSyncBadge('error');
    state = { tasks:[], completions:[], adjustments:[], spins:[], vales:[],
      prizes:{ weekly:WEEKLY_PRIZES.map(p=>({...p,enabled:true})), monthly:MONTHLY_PRIZES.map(p=>({...p,enabled:true})) },
      shopItems:DEFAULT_SHOP_ITEMS.map(i=>({...i})), purchases:[], extraSpins:[] };
    _showServerError();
    return;
  }

  // 2. Carrega o state do servidor
  try {
    const res = await _fetchT('/api/state', {}, 5000);
    if (res.ok) {
      const data = await res.json();
      if (data && data.tasks) {
        state = data;
        _migrateState();
        _setSyncBadge('ok');
        return;
      }
    }
    // 404 = primeiro uso, cria estado inicial
    if (res.status === 404) {
      state = defaultState();
      _setSyncBadge('ok');
      await _persistToServer();
      return;
    }
  } catch(e) {
    console.error('Erro ao carregar state:', e.message);
  }
  _setSyncBadge('error');
  _showServerError();
}

async function _persistToServer() {
  try {
    await _fetchT('/api/state', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(state)
    }, 5000);
    _setSyncBadge('ok');
  } catch(e) {
    _setSyncBadge('error');
  }
}

function saveState() {
  // Salva direto no servidor — única fonte de verdade
  clearTimeout(_saveTimer);

}

// ======================== DATE UTILS ========================
function toStr(d)  { return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`; }
function pad(n)    { return String(n).padStart(2,'0'); }
function fromStr(s){ const [y,m,d]=s.split('-').map(Number); return new Date(y,m-1,d); }
function todayStr(){ return toStr(new Date()); }

function getWeekDays(refStr) {
  const ref = fromStr(refStr);
  const dow = ref.getDay(); // 0=Dom, 1=Seg, ..., 6=Sáb
  const sun = new Date(ref);
  sun.setDate(ref.getDate() - dow); // retrocede até o Domingo
  return Array.from({length:7}, (_,i) => { const d=new Date(sun); d.setDate(sun.getDate()+i); return toStr(d); });
}

function getMonthDays(year, month) {
  const days=[], d=new Date(year,month-1,1);
  while(d.getMonth()===month-1){ days.push(toStr(new Date(d))); d.setDate(d.getDate()+1); }
  return days;
}

function getWeekKey(dateStr) { return `week_${getWeekDays(dateStr)[0]}`; }
function getMonthKey(year,month) { return `month_${year}-${pad(month)}`; }

// ======================== BUSINESS LOGIC ========================
function getLevel(pts) { let lv=LEVELS[0]; for(const l of LEVELS){if(pts>=l.min)lv=l;} return lv; }
function getLevelProgress(pts) {
  const lv=getLevel(pts); if(!lv.next) return 100;
  return Math.min(100,Math.round(((pts-lv.min)/(lv.next-lv.min))*100));
}

function getTasksForDay(dateStr, assignee) {
  const dow = fromStr(dateStr).getDay();
  return state.tasks
    .filter(t=>{
      if(t.assignee!==assignee && t.assignee!=='ambos') return false;
      if(t.type==='recorrente') return t.days.length===0 || t.days.includes(dow);
      return t.date===dateStr;
    })
    .sort((a,b)=>(a.order||0)-(b.order||0));
}

function isCompleted(taskId, assignee, dateStr) {
  return state.completions.some(c=>c.taskId===taskId&&c.assignee===assignee&&c.date===dateStr);
}

function toggleCompletion(taskId, assignee, dateStr) {
  const idx=state.completions.findIndex(c=>c.taskId===taskId&&c.assignee===assignee&&c.date===dateStr);
  if(idx>=0){ state.completions.splice(idx,1); saveState(); return false; }
  const task=state.tasks.find(t=>t.id===taskId);
  if(!task) return false;
  state.completions.push({taskId,assignee,date:dateStr,points:task.points,at:Date.now()});
  saveState(); return true;
}

function ptsForDate(assignee, dateStr) {
  const earned = state.completions.filter(c=>c.assignee===assignee&&c.date===dateStr).reduce((s,c)=>s+(c.points||0),0);
  const adj    = state.adjustments.filter(a=>a.assignee===assignee&&a.date===dateStr).reduce((s,a)=>s+(a.points||0),0);
  return Math.max(0, earned + adj);
}

function ptsEarnedForDate(assignee, dateStr) {
  return state.completions.filter(c=>c.assignee===assignee&&c.date===dateStr).reduce((s,c)=>s+(c.points||0),0);
}

function ptsTotal(assignee) {
  const earned = state.completions.filter(c=>c.assignee===assignee).reduce((s,c)=>s+(c.points||0),0);
  const adj    = state.adjustments.filter(a=>a.assignee===assignee).reduce((s,a)=>s+(a.points||0),0);
  return Math.max(0, earned+adj);
}

function tasksDone(assignee)  { return state.completions.filter(c=>c.assignee===assignee).length; }

function coinsEarned(assignee)  { return state.completions.filter(c=>c.assignee===assignee).reduce((s,c)=>s+(c.points||0),0); }
function coinsSpent(assignee)   { return (state.purchases||[]).filter(p=>p.assignee===assignee).reduce((s,p)=>s+(p.price||0),0); }
function coinsBalance(assignee) { return Math.max(0, coinsEarned(assignee) - coinsSpent(assignee)); }

function hasExtraSpinToken(type) { return (state.extraSpins||[]).some(t=>t.type==='extra_spin_'+type&&!t.used); }
function consumeExtraSpinToken(type) {
  const t = (state.extraSpins||[]).find(t=>t.type==='extra_spin_'+type&&!t.used);

  return dates.filter(d=>{
    const a=ptsForDate('alex',d), k=ptsForDate('ketellyn',d);

function winnerBadge(ds,compact=false) {
  const today=todayStr(), future=ds>today;
  const a=ptsForDate('alex',ds), k=ptsForDate('ketellyn',ds);
  if(future) return '';
  if(a===0&&k===0) return ds===today?'⏳':'-';
  if(a>k) return compact?'💙':'💙 Alex';
  if(k>a) return compact?'💗':'💗 Ket';
  return '🤝';
}

}

function fulfillVale(valeId) {
  const vale = state.vales.find(v=>v.id===valeId);
  if(!vale||vale.status!=='active') return;
  vale.status = 'fulfilled';
  vale.resolvedAt = Date.now();
  saveState(); renderTab();
}

function breakVale(valeId) {
  const vale = state.vales.find(v=>v.id===valeId);
  if(!vale||vale.status!=='active') return;

  const today = todayStr();
  const punished = vale.winner==='alex' ? 'ketellyn' : 'alex';
  const rewarded  = vale.winner;

  const earned  = ptsEarnedForDate(punished, today);
  const deduct  = Math.round(earned * 0.50);
  const bonus   = Math.round(deduct * 0.50);

  if(deduct>0) {
    state.adjustments.push({ id:uid(), date:today, assignee:punished, points:-deduct, reason:`Penalidade: não cumpriu ${vale.prize.label}`, valeId });
  }
  if(bonus>0) {
    state.adjustments.push({ id:uid(), date:today, assignee:rewarded,  points:+bonus,  reason:`Bônus: ${vale.prize.label} não cumprido`,    valeId });
  }

  vale.status = 'broken';
  vale.resolvedAt = Date.now();
  vale.penaltyDeducted = deduct;
  vale.penaltyBonus    = bonus;

  saveState(); renderTab();
}

function buildWheelSVG(prizes) {
  const n=prizes.length, cx=140,cy=140,r=128;
  const arc=(2*Math.PI)/n;
  let segs='';
  prizes.forEach((p,i)=>{
    const a0=i*arc-Math.PI/2, a1=(i+1)*arc-Math.PI/2;
    const x0=(cx+r*Math.cos(a0)).toFixed(2), y0=(cy+r*Math.sin(a0)).toFixed(2);
    const x1=(cx+r*Math.cos(a1)).toFixed(2), y1=(cy+r*Math.sin(a1)).toFixed(2);
    const large=arc>Math.PI?1:0;
    const path=`M${cx},${cy} L${x0},${y0} A${r},${r} 0 ${large},1 ${x1},${y1} Z`;

    const amid=i*arc+arc/2-Math.PI/2;
    const dist=r*0.63;
    const tx=(cx+dist*Math.cos(amid)).toFixed(2);
    const ty=(cy+dist*Math.sin(amid)).toFixed(2);
    const textDeg=((i*arc+arc/2)*180/Math.PI);

    segs += `<path d="${path}" fill="${p.color}" stroke="rgba(0,0,0,0.18)" stroke-width="1.5"/>`;
    segs += `<g transform="rotate(${textDeg.toFixed(1)},${tx},${ty})">
      <text x="${tx}" y="${(parseFloat(ty)-7).toFixed(2)}" text-anchor="middle" font-size="18" font-family="serif">${p.emoji}</text>
      <text x="${tx}" y="${(parseFloat(ty)+9).toFixed(2)}" text-anchor="middle" font-size="9" font-weight="800" font-family="Nunito,sans-serif" fill="rgba(255,255,255,0.92)">${p.shortLabel}</text>
    </g>`;
  });
  return `<svg viewBox="0 0 280 280" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:100%">
    <circle cx="${cx}" cy="${cy}" r="${r+6}" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.12)" stroke-width="3"/>
    ${segs}
    <circle cx="${cx}" cy="${cy}" r="24" fill="#07071a"/>
    <circle cx="${cx}" cy="${cy}" r="21" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="2"/>
    <text x="${cx}" y="${cy+7}" text-anchor="middle" font-size="18" font-family="serif">🚀</text>
  </svg>`;
}

function doSpin() {
  if(wheelDone) return;
  const prizes=roulPrizes, n=prizes.length, arc=360/n;
  const resultIdx=Math.floor(Math.random()*n);
  // A roda gira no sentido horário (CSS rotate+).
  // O segmento i está centrado em (i*arc + arc/2)° a partir do topo.
  // Para o ponteiro (topo) apontar para o segmento i após rotação R:
  //   (360 - R) % 360 = i*arc + arc/2  →  R = (360 - i*arc - arc/2) % 360
  const prizeCenter=(360 - resultIdx*arc - arc/2 + 360) % 360;
  const jitter=(Math.random()-0.5)*arc*0.5;
  const target=prizeCenter+jitter;
  const currentMod=wheelRot%360;
  let diff=target-currentMod;
  if(diff<=0) diff+=360;
  const fullSpins=(7+Math.floor(Math.random()*4))*360;
  wheelRot+=fullSpins+diff;

  const wrap=document.getElementById('wheelSvgWrap');
  wrap.style.transition=`transform 4.8s cubic-bezier(0.1,0.85,0.28,1.0)`;
  wrap.style.transform=`rotate(${wheelRot}deg)`;

  const btn=document.getElementById('btnDoSpin');
  btn.disabled=true; btn.textContent='⏳ Girando...';

  setTimeout(()=>{ showSpinResult(prizes[resultIdx]); }, 5000);
}

function showSpinResult(prize) {
  wheelDone=true;
  const wName=roulWinner==='alex'?'Alex':'Kétellyn';
  document.getElementById('spinResultArea').innerHTML=`
    <div class="spin-result-banner">

      <div class="sr-title">${prize.label}!</div>
      <div class="sr-desc">${prize.desc}</div>
    </div>`;

  const btn=document.getElementById('btnDoSpin');
  btn.disabled=false;
  btn.textContent='✓ Guardar Vale e Fechar';
  btn.style.background='linear-gradient(135deg,#43a047,#1b5e20)';
  btn.onclick=()=>{ recordSpin(prize); document.getElementById('modalRoulette').hidden=true; renderTab(); };
}

function recordSpin(prize) {
  const spinId=uid();
  state.spins.push({ id:spinId, key:roulKey, type:roulType, winner:roulWinner, prize, date:todayStr(), isExtra:roulIsExtra });
  state.vales.push({ id:uid(), spinId, key:roulKey, type:roulType, winner:roulWinner, prize, status:'active', createdAt:Date.now() });

  saveState();
}

function buildPersonCol(assignee,name,emoji,dateStr) {
  const cls=assignee==='alex'?'alex':'ket';
  const tasks=getTasksForDay(dateStr,assignee);
  const pts=ptsForDate(assignee,dateStr);
  const done=tasks.filter(t=>isCompleted(t.id,assignee,dateStr)).length;

  let taskHtml='';
  if(tasks.length===0) {
    taskHtml=`<div class="empty-state">Sem tarefas hoje!<br>🎉 Dia livre!</div>`;
  } else {
    // Agrupar por categoria
    const groups=new Map();
    tasks.forEach(t=>{
      const cid=t.category||'outros';
      if(!groups.has(cid)) groups.set(cid,[]);
      groups.get(cid).push(t);
    });
    // Exibir na ordem de TASK_CATEGORIES
    TASK_CATEGORIES.forEach(cat=>{
      const catTasks=groups.get(cat.id);
      if(!catTasks||catTasks.length===0) return;
      taskHtml+=`<div class="cat-header" style="--cat-color:${cat.color}">
        <span class="cat-dot"></span><span>${cat.emoji} ${cat.label}</span>

        return `<div class="task-item ${checked?'completed':''}" data-task="${t.id}" data-who="${assignee}" data-date="${dateStr}">

            <div class="task-title">${esc(t.title)}</div>
            <div class="task-pts">⚡ ${t.points} pts</div>
          </div>
        </div>`;
      }).join('');
    });
  }

  return `<div class="person-col ${cls}">
    <div class="person-header ${cls}">
      <div class="person-avatar">${emoji}</div>
      <div>
        <div class="person-name">${name}</div>

      <div class="score-display">${pts}</div>
      <div class="score-label">⚡ pontos hoje</div>

  </div>`;
}

// ---- WINNER SECTION ----
function buildWinnerSection(type, key, alexPts, ketPts) {
  const label   = type==='weekly' ? 'da Semana' : 'do Mês';
  const icon    = type==='weekly' ? '🎡' : '🎰';
  const winner  = getPeriodWinner(alexPts, ketPts);
  const spin    = getSpinForKey(key);

  // --- Status line (who's leading) ---
  let statusHtml;
  if (alexPts===0 && ketPts===0) {
    statusHtml = `<div class="ws-status neutral">Sem pontos ainda este período</div>`;
  } else if (!winner) {
    statusHtml = `<div class="ws-status neutral">🤝 Empate — ${alexPts} pts cada</div>`;
  } else {
    const wName  = winner==='alex' ? 'Alex' : 'Kétellyn';
    const wEmoji = winner==='alex' ? '💙'   : '💗';
    const wColor = winner==='alex' ? 'var(--alex)' : 'var(--ket)';
    const lName  = winner==='alex' ? 'Kétellyn' : 'Alex';
    const diff   = Math.abs(alexPts - ketPts);
    statusHtml = `<div class="ws-status winner" style="color:${wColor}">${wEmoji} ${wName} lidera por ${diff} pts sobre ${lName}</div>`;
  }

  // --- Extra spin token check ---
  const hasExtra = hasExtraSpinToken(type);

  // --- Lock checks por tipo ---
  const _today = todayStr();
  const _now   = new Date();
  let _periodUnlocked = true;
  let _periodLockReason = '';

  if (type === 'weekly') {
    // Semanal: só no Domingo após a semana (Dom–Sáb) terminar
    const _wDays = getWeekDays(key.replace('week_',''));
    const _isSunday  = _now.getDay() === 0;
    const _weekEnded = _wDays[6] < _today;
    if (!_isSunday) {
      _periodUnlocked   = false;
      _periodLockReason = '📅 Disponível toda Domingo';
    } else if (!_weekEnded) {
      _periodUnlocked   = false;
      _periodLockReason = '⏳ Semana ainda não terminou (aguarde o Sábado)';
    }
  }

  if (type === 'monthly') {
    // Mensal: só no dia 1 do mês seguinte
    const [_mYear, _mMonth] = key.replace('month_','').split('-').map(Number);
    const _firstNextMonth = toStr(new Date(_mYear, _mMonth, 1)); // mês 0-indexed: _mMonth = próximo mês
    if (_today !== _firstNextMonth) {
      _periodUnlocked   = false;
      const _nextMonthName = MONTHS[_mMonth % 12];
      _periodLockReason = `📅 Disponível em 1º de ${_nextMonthName}`;
    }
  }

  // --- Spin button state ---
  let spinBtnHtml;
  if (spin) {
    // Already spun: show locked button + prize info
    const extraOk = winner && hasExtra && _periodUnlocked;
    const extraBtn = extraOk ? `
      <button class="spin-btn" id="btnSpinNow" style="margin-top:8px;background:linear-gradient(135deg,#f57f17,#bf360c)">🎡 Usar Giro Extra!</button>
      <div style="font-size:.7rem;color:var(--gold);text-align:center;margin-top:4px">1 giro extra disponível</div>`
    : (winner && hasExtra && !_periodUnlocked) ? `
      <button class="spin-btn spin-btn--locked" disabled style="margin-top:8px">🔒 Giro Extra · ${_periodLockReason}</button>` : '';
    spinBtnHtml = `
      <button class="spin-btn spin-btn--done" disabled>✓ Roleta ${label} já girada</button>
      <div class="spin-already-result">
        <span style="font-size:1.3rem">${spin.prize.emoji}</span>
        <div>
          <div style="font-weight:900;font-size:.9rem;color:var(--gold)">${spin.prize.label}</div>
          <div style="font-size:.7rem;color:var(--text-dim)">Girado em ${spin.date} · ver em Ranking → Vales</div>
        </div>
      </div>${extraBtn}`;
  } else if (!winner) {
    // Tie or no points: locked
    const reason = alexPts===0&&ketPts===0 ? 'Complete tarefas para desbloquear' : 'Empate — precisa de um vencedor';
    spinBtnHtml = `
      <button class="spin-btn spin-btn--locked" disabled>🔒 Girar Roleta ${label}</button>
      <div class="spin-lock-reason">${reason}</div>`;
  } else if (!_periodUnlocked) {
    spinBtnHtml = `
      <button class="spin-btn spin-btn--locked" disabled>${icon} Girar Roleta ${label}</button>
      <div class="spin-lock-reason">${_periodLockReason}</div>`;
  } else {
    // Has winner, unlocked: active
    spinBtnHtml = `<button class="spin-btn" id="btnSpinNow">${icon} Girar Roleta ${label}</button>`;
  }

  return `<div class="winner-section">
    <div class="ws-label">${icon} Roleta ${label}</div>
    ${statusHtml}
    <div class="ws-spin-area">${spinBtnHtml}</div>
    <button class="prize-config-link" id="btnOpenPrizes">⚙️ Configurar prêmios da roleta</button>
  </div>`;
}

// ---- CATEGORY STATS ----
function buildCategoryStats() {
  const stats={};
  TASK_CATEGORIES.forEach(c=>{ stats[c.id]={alex:0,ket:0}; });
  state.completions.forEach(c=>{
    const task=state.tasks.find(t=>t.id===c.taskId);
    const cid=(task&&task.category)||'outros';
    if(!stats[cid]) stats[cid]={alex:0,ket:0};
    if(c.assignee==='alex') stats[cid].alex++;
    else if(c.assignee==='ketellyn') stats[cid].ket++;
  });
  const active=TASK_CATEGORIES.filter(c=>(stats[c.id]?.alex||0)+(stats[c.id]?.ket||0)>0);
  if(active.length===0) return '';

  const rows=active.map(cat=>{
    const s=stats[cat.id];
    const total=s.alex+s.ket;
    const aPct=Math.round((s.alex/total)*100);
    const kPct=100-aPct;
    return `<div class="cat-stat-row">
      <div class="cat-stat-hdr">
        <span style="font-weight:800">${cat.emoji} ${cat.label}</span>
        <span style="color:var(--text-dim);font-size:.72rem">${total} tarefa${total!==1?'s':''}</span>
      </div>
      <div class="bar-track" style="height:8px;border-radius:4px;margin:5px 0 3px">
        <div class="bar-alex" style="width:${aPct}%;border-radius:4px 0 0 4px"></div>
        <div class="bar-ket"  style="width:${kPct}%;border-radius:0 4px 4px 0"></div>
      </div>
      <div class="bar-labels" style="font-size:.7rem">
        <span style="color:var(--alex)">💙 Alex ${s.alex}</span>
        <span style="color:var(--ket)">💗 Ket ${s.ket}</span>
      </div>
    </div>`;
  }).join('');

  return `<div class="comparison-block" style="margin-top:14px">
    <h3>📊 Tarefas por Categoria</h3>
    <div style="display:flex;flex-direction:column;gap:14px;margin-top:12px">${rows}</div>
  </div>`;
}

const PRIZE_COLORS = ['#1e88e5','#e64a19','#8e24aa','#2e7d32','#c62828','#4527a0','#b71c1c','#00695c','#bf360c','#e65100','#0277bd','#388e3c','#880e4f','#00838f','#ad1457','#1565c0'];
let prizeTabActive = 'weekly';
let editingPrize = null; // {type, id} or {type, id:'__new__'}

function openPrizesModal(defaultTab='weekly') {
  prizeTabActive = defaultTab;
  editingPrize = null;
  renderPrizesBody(prizeTabActive);

}

function renderPrizesBody(type) {
  prizeTabActive = type;
  const prizes = state.prizes[type] || [];

  const prizeItems = prizes.map(p => {

      </div>
    </div>`;
  }).join('');

  const activeCount = prizes.filter(p=>p.enabled!==false).length;

  document.getElementById('prizesBody').innerHTML = `

    ${isAddNew ? buildPrizeEditForm(type, null) : ''}
    <div class="prizes-footer">
      <button class="add-task-btn" onclick="startAddPrize('${type}')">➕ Novo Prêmio</button>

function buildPrizeEditForm(type, prize) {
  const id = prize ? prize.id : '__new__';
  return `<div class="prize-edit-form">
    <div style="font-size:.72rem;font-weight:800;color:var(--text-dim);text-transform:uppercase;letter-spacing:.05em;margin-bottom:12px;">
      ${prize ? '✏️ Editar Prêmio' : '➕ Novo Prêmio'}
    </div>
    <div class="prize-edit-row">
      <div><label class="form-label">Emoji</label>
           <input class="form-input" id="pe_emoji" value="${prize?prize.emoji:''}" placeholder="🎁" maxlength="4" style="text-align:center;font-size:1.3rem;padding:8px;"/></div>
      <div><label class="form-label">Nome</label>
           <input class="form-input" id="pe_label" value="${prize?esc(prize.label):''}" placeholder="Nome do prêmio"/></div>
    </div>
    <div style="margin-bottom:12px"><label class="form-label">Descrição</label>
      <input class="form-input" id="pe_desc" value="${prize?esc(prize.desc):''}" placeholder="O que esse vale permite..."/></div>
    <div style="display:flex;gap:8px;">
      <button class="btn-sm" onclick="savePrize('${type}','${id}')">✓ Salvar</button>
      <button class="btn-sm-ghost" onclick="cancelEditPrize('${type}')">Cancelar</button>
    </div>
  </div>`;
}

function togglePrize(type, id) {
  const p = state.prizes[type].find(x=>x.id===id);
  if(!p) return;
  const wouldDisable = p.enabled!==false;
  const activeNow = state.prizes[type].filter(x=>x.enabled!==false).length;
  if(wouldDisable && activeNow <= 2) { alert('A roleta precisa de pelo menos 2 prêmios ativos.'); return; }
  p.enabled = p.enabled===false;
  saveState(); renderPrizesBody(type);
}

function startEditPrize(type, id) { editingPrize={type,id}; renderPrizesBody(type); }
function startAddPrize(type)       { editingPrize={type,id:'__new__'}; renderPrizesBody(type); }
function cancelEditPrize(type)     { editingPrize=null; renderPrizesBody(type); }

function savePrize(type, id) {
  const emoji = document.getElementById('pe_emoji').value.trim() || '🎁';
  const label = document.getElementById('pe_label').value.trim();
  const desc  = document.getElementById('pe_desc').value.trim();
  if(!label) { document.getElementById('pe_label').focus(); return; }
  const shortLabel = label.replace(/^Vale\s*/i,'').slice(0,10).trim();

  if(id==='__new__') {
    const col = PRIZE_COLORS[state.prizes[type].length % PRIZE_COLORS.length];
    state.prizes[type].push({ id:uid(), emoji, label, shortLabel, color:col, desc, enabled:true });
  } else {
    const p = state.prizes[type].find(x=>x.id===id);
    if(p) { p.emoji=emoji; p.label=label; p.shortLabel=shortLabel; p.desc=desc; }
  }
  editingPrize = null;
  saveState(); renderPrizesBody(type);
}

function deletePrize(type, id) {
  const active = state.prizes[type].filter(p=>p.enabled!==false&&p.id!==id).length;
  if(active < 2) { alert('A roleta precisa de pelo menos 2 prêmios ativos.'); return; }
  if(!confirm('Remover este prêmio?')) return;
  state.prizes[type] = state.prizes[type].filter(p=>p.id!==id);
  saveState(); renderPrizesBody(type);
}

function resetPrizes(type) {
  if(!confirm('Restaurar prêmios padrão? Prêmios personalizados serão removidos.')) return;
  const defs = type==='weekly' ? WEEKLY_PRIZES : MONTHLY_PRIZES;
  state.prizes[type] = defs.map(p=>({...p,enabled:true}));
  editingPrize = null;
  saveState(); renderPrizesBody(type);
}

// ======================== TAB EVENTS ========================
function bindTabEvents() {
  if(currentTab==='dia') {
    document.querySelectorAll('.task-item').forEach(el=>el.addEventListener('click',onTaskClick));
  }
  if(currentTab==='semana') {
    document.getElementById('btnPrevWeek')?.addEventListener('click',()=>shiftWeek(-1));
    document.getElementById('btnNextWeek')?.addEventListener('click',()=>shiftWeek(+1));
    document.getElementById('btnSpinNow')?.addEventListener('click',e=>{
      const key=getWeekKey(weekRef);
      const days=getWeekDays(weekRef);
      const past=days.filter(d=>d<=todayStr());
      const wa=past.reduce((s,d)=>s+ptsForDate('alex',d),0);
      const wk=past.reduce((s,d)=>s+ptsForDate('ketellyn',d),0);
      const winner=getPeriodWinner(wa,wk);
      const isExtra=hasSpun(key)&&hasExtraSpinToken('weekly');
      if(winner) openRouletteModal('weekly',key,winner,getActivePrizes('weekly'),isExtra);
    });
    document.getElementById('btnOpenPrizes')?.addEventListener('click',()=>openPrizesModal('weekly'));
  }
  if(currentTab==='mes') {
    document.getElementById('btnPrevMonth')?.addEventListener('click',()=>{
      monthRef.month--; if(monthRef.month<1){monthRef.month=12;monthRef.year--;}; renderTab();
    });
    document.getElementById('btnNextMonth')?.addEventListener('click',()=>{
      monthRef.month++; if(monthRef.month>12){monthRef.month=1;monthRef.year++;}; renderTab();
    });
    document.getElementById('btnSpinNow')?.addEventListener('click',()=>{
      const {year,month}=monthRef;
      const key=getMonthKey(year,month);
      const days=getMonthDays(year,month);
      const today=todayStr();
      const past=days.filter(d=>d<=today);
      const ma=past.reduce((s,d)=>s+ptsForDate('alex',d),0);
      const mk=past.reduce((s,d)=>s+ptsForDate('ketellyn',d),0);
      const winner=getPeriodWinner(ma,mk);
      const isExtra=hasSpun(key)&&hasExtraSpinToken('monthly');
      if(winner) openRouletteModal('monthly',key,winner,getActivePrizes('monthly'),isExtra);
    });
    document.getElementById('btnOpenPrizes')?.addEventListener('click',()=>openPrizesModal('monthly'));
  }
  if(currentTab==='loja') {
    document.getElementById('btnShopManage')?.addEventListener('click',openShopManageModal);
    document.querySelectorAll('.sic-buy-btn').forEach(b=>b.addEventListener('click',()=>buyShopItem(b.dataset.item,b.dataset.who)));
  }
}

function onTaskClick(e) {
  const el=e.currentTarget;
  const completed=toggleCompletion(el.dataset.task,el.dataset.who,el.dataset.date);
  if(completed){
    const task=state.tasks.find(t=>t.id===el.dataset.task);
    spawnPopup(e.clientX,e.clientY,task.points,el.dataset.who==='alex'?'#4fc3f7':'#f48fb1');
  }
  renderTab();
}

function spawnPopup(x,y,pts,color) {
  const el=document.createElement('div');
  el.className='point-popup';
  el.style.cssText=`left:${x-22}px;top:${y-30}px;color:${color};text-shadow:0 0 12px ${color}80;`;
  el.textContent=`+${pts} ⚡`;
  document.body.appendChild(el);
  setTimeout(()=>el.remove(),900);
}

function openManageModal() { renderManageBody(); document.getElementById('modalManage').hidden=false; }

function renderManageBody() {
  const sorted=[...state.tasks].sort((a,b)=>(a.order||0)-(b.order||0));
  const listHtml=sorted.map((t,i)=>{
    const ab=t.assignee==='alex'?'badge-alex':t.assignee==='ketellyn'?'badge-ket':'badge-ambos';

    return `<div class="manage-task-item" draggable="true" data-idx="${i}" data-tid="${t.id}">

          <span class="badge ${ab}">${al}</span>
          <span class="badge ${t.type==='recorrente'?'badge-rec':'badge-avulso'}">${t.type==='recorrente'?'🔄 Recorrente':'📌 Avulso'}</span>
          ${(()=>{ const c=getCategory(t); return `<span class="badge" style="background:var(--surface2);color:${c.color}">${c.emoji} ${c.label}</span>`; })()}
          ${dayLabel}
        </div>
      </div>
      <div class="manage-task-btns">
        <button class="icon-btn btn-edit" data-tid="${t.id}">✏️</button>
        <button class="icon-btn delete btn-del" data-tid="${t.id}">🗑️</button>
      </div>
    </div>`;
  }).join('');

  document.getElementById('manageBody').innerHTML=`
    <button class="add-task-btn" id="btnAddTask">➕ Adicionar Tarefa</button>
    <div class="manage-list" id="manageList">${listHtml||'<div class="empty-state">Nenhuma tarefa. Adicione a primeira!</div>'}</div>`;

  document.getElementById('btnAddTask').addEventListener('click',()=>openTaskModal(null));
  document.querySelectorAll('.btn-edit').forEach(b=>b.addEventListener('click',e=>{e.stopPropagation();openTaskModal(b.dataset.tid);}));
  document.querySelectorAll('.btn-del').forEach(b=>b.addEventListener('click',e=>{e.stopPropagation();removeTask(b.dataset.tid);}));
  initDragDrop();
}

function initDragDrop() {
  document.querySelectorAll('.manage-task-item').forEach(item=>{
    item.addEventListener('dragstart',e=>{dragSrc=parseInt(item.dataset.idx);item.classList.add('dragging');e.dataTransfer.effectAllowed='move';});
    item.addEventListener('dragend',()=>{item.classList.remove('dragging');document.querySelectorAll('.manage-task-item').forEach(i=>{i.style.borderColor='';i.style.background='';});});
    item.addEventListener('dragover',e=>{e.preventDefault();item.style.borderColor='rgba(255,255,255,.4)';item.style.background='rgba(255,255,255,.08)';});
    item.addEventListener('dragleave',()=>{item.style.borderColor='';item.style.background='';});
    item.addEventListener('drop',e=>{
      e.preventDefault();item.style.borderColor='';item.style.background='';
      const dst=parseInt(item.dataset.idx);
      if(dragSrc===null||dragSrc===dst) return;
      const s=[...state.tasks].sort((a,b)=>(a.order||0)-(b.order||0));
      const [m]=s.splice(dragSrc,1);s.splice(dst,0,m);s.forEach((t,i)=>t.order=i);
      saveState();renderManageBody();if(currentTab==='dia')renderTab();dragSrc=null;
    });
  });
}

function removeTask(taskId) {
  if(!confirm('Apagar esta tarefa e seu histórico?')) return;
  state.tasks=state.tasks.filter(t=>t.id!==taskId);
  state.completions=state.completions.filter(c=>c.taskId!==taskId);
  saveState();renderManageBody();renderTab();
}

  document.getElementById('inputDate').value=task?.date||todayStr();
  selAssignee=task?task.assignee:'alex';
  selType=task?task.type:'recorrente';
  selDays=task?[...(task.days||[])]:[];
  selCategory=task?(task.category||'outros'):'outros';
  syncAssigneeUI();syncTypeUI();buildCategoryToggles();
  const actEl=document.getElementById('taskFormActions');
  if(task){
    actEl.innerHTML=`<button class="btn-danger" id="btnDelEdit">🗑️ Apagar</button><button class="btn-primary" id="btnSaveTask">Salvar</button>`;
    document.getElementById('btnDelEdit').addEventListener('click',()=>{
      if(!confirm('Apagar esta tarefa?')) return;
      state.tasks=state.tasks.filter(t=>t.id!==editId);
      state.completions=state.completions.filter(c=>c.taskId!==editId);
      saveState();closeTaskModal();renderManageBody();renderTab();
    });
  } else {
    actEl.innerHTML=`<button class="btn-primary" id="btnSaveTask">Salvar Tarefa</button>`;
  }
  document.getElementById('btnSaveTask').addEventListener('click',saveTask);
  document.getElementById('modalTask').hidden=false;
  document.getElementById('inputTitle').focus();
}

function syncAssigneeUI() { document.querySelectorAll('#assigneeGroup .toggle-btn').forEach(b=>b.classList.toggle('active',b.dataset.val===selAssignee)); }
function syncTypeUI() {
  document.querySelectorAll('#typeGroup .toggle-btn').forEach(b=>b.classList.toggle('active',b.dataset.val===selType));
  document.getElementById('daysGroup').style.display=selType==='recorrente'?'':'none';
  document.getElementById('dateGroup').style.display=selType==='avulso'?'':'none';
  buildDayToggles();
}
function buildDayToggles() {
  const c=document.getElementById('dayToggles');
  c.innerHTML=DAY_SHORT.map((nm,i)=>`<button class="day-toggle ${selDays.includes(i)?'active':''}" data-d="${i}">${nm}</button>`).join('');
  c.querySelectorAll('.day-toggle').forEach(b=>b.addEventListener('click',()=>{
    const d=parseInt(b.dataset.d);
    selDays.includes(d)?(selDays=selDays.filter(x=>x!==d)):selDays.push(d);buildDayToggles();
  }));
}
function buildCategoryToggles() {
  const c=document.getElementById('categoryGroup');
  if(!c) return;
  c.innerHTML=TASK_CATEGORIES.map(cat=>`
    <button class="cat-toggle-btn ${selCategory===cat.id?'active':''}" data-cat="${cat.id}" style="--cat-color:${cat.color}">
      ${cat.emoji} ${cat.label}
    </button>`).join('');
  c.querySelectorAll('.cat-toggle-btn').forEach(b=>b.addEventListener('click',()=>{
    selCategory=b.dataset.cat; buildCategoryToggles();
  }));
}

function saveTask() {
  const title=document.getElementById('inputTitle').value.trim();
  const points=Math.max(1,parseInt(document.getElementById('inputPoints').value)||10);
  if(!title){document.getElementById('inputTitle').focus();return;}
  if(editId){
    const t=state.tasks.find(x=>x.id===editId);
    if(t){t.title=title;t.points=points;t.assignee=selAssignee;t.type=selType;t.category=selCategory;t.days=selType==='recorrente'?[...selDays]:[];t.date=selType==='avulso'?document.getElementById('inputDate').value:undefined;}
  } else {
    const maxOrd=state.tasks.reduce((m,t)=>Math.max(m,t.order||0),-1);
    state.tasks.push({id:uid(),title,points,assignee:selAssignee,type:selType,category:selCategory,days:selType==='recorrente'?[...selDays]:[],date:selType==='avulso'?document.getElementById('inputDate').value:undefined,order:maxOrd+1});
  }
  saveState();closeTaskModal();renderManageBody();renderTab();
}
function closeTaskModal(){document.getElementById('modalTask').hidden=true;editId=null;}

// ======================== UTILS ========================
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

// ======================== INIT ========================
document.querySelectorAll('.tab-btn').forEach(b=>b.addEventListener('click',()=>{
  document.querySelectorAll('.tab-btn').forEach(x=>x.classList.remove('active'));
  b.classList.add('active');currentTab=b.dataset.tab;renderTab();
}));

document.getElementById('btnManage').addEventListener('click',openManageModal);
document.getElementById('btnCloseManage').addEventListener('click',()=>{document.getElementById('modalManage').hidden=true;});
document.getElementById('modalManage').addEventListener('click',e=>{if(e.target===e.currentTarget)document.getElementById('modalManage').hidden=true;});

document.getElementById('btnCloseTask').addEventListener('click',closeTaskModal);
document.getElementById('modalTask').addEventListener('click',e=>{if(e.target===e.currentTarget)closeTaskModal();});

document.getElementById('btnClosePrizes').addEventListener('click',()=>{document.getElementById('modalPrizes').hidden=true;});
document.getElementById('modalPrizes').addEventListener('click',e=>{if(e.target===e.currentTarget)document.getElementById('modalPrizes').hidden=true;});

document.getElementById('btnCloseRoulette').addEventListener('click',()=>{document.getElementById('modalRoulette').hidden=true;});
document.getElementById('modalRoulette').addEventListener('click',e=>{if(e.target===e.currentTarget)document.getElementById('modalRoulette').hidden=true;});

document.getElementById('btnCloseShopManage').addEventListener('click',()=>{document.getElementById('modalShopManage').hidden=true;});
document.getElementById('modalShopManage').addEventListener('click',e=>{if(e.target===e.currentTarget)document.getElementById('modalShopManage').hidden=true;});

document.getElementById('btnCloseShopItem').addEventListener('click',()=>{document.getElementById('modalShopItem').hidden=true;});
document.getElementById('modalShopItem').addEventListener('click',e=>{if(e.target===e.currentTarget)document.getElementById('modalShopItem').hidden=true;});

document.getElementById('siSpecialGroup').addEventListener('click',e=>{const b=e.target.closest('.toggle-btn');if(!b)return;siSelSpecial=b.dataset.val;syncSiSpecialUI();});

document.getElementById('assigneeGroup').addEventListener('click',e=>{const b=e.target.closest('.toggle-btn');if(!b)return;selAssignee=b.dataset.val;syncAssigneeUI();});
document.getElementById('typeGroup').addEventListener('click',e=>{const b=e.target.closest('.toggle-btn');if(!b)return;selType=b.dataset.val;syncTypeUI();});

buildDayToggles();
try { localStorage.clear(); } catch(e) {} // remove dados locais antigos — servidor é a fonte de verdade
loadState().then(() => renderApp());
</script>
</body>
</html>
